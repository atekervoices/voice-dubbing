services:
  ai_studio:
    build: .
    container_name: dub_monolith
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/data/models_cache/hf
      - TTS_HOME=/app/data/models_cache/tts
      - COQUI_TOS_AGREED=1
      - GRADIO_ANALYTICS_ENABLED=False
      - MKL_THREADING_LAYER=GNU
      - MKL_SERVICE_FORCE_INTEL=1
      - HF_TOKEN=
      # OpenAI-compatible translation (used in Phase 2). Set OPENAI_API_KEY to a real
      # key to enable translation. The other two are optional and default sensibly.
      - OPENAI_API_KEY=
      - OPENAI_BASE_URL=https://api.openai.com
      - OPENAI_MODEL=gpt-4o-mini
      # Tame CUDA fragmentation for the demucs XTTS call
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    ports:
      - "8060:8060"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
